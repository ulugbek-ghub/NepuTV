name: Build NepuTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Gradle 8.4 via official action (no wrapper JAR needed) ─────
      #    This action installs Gradle and puts it on PATH, then we use
      #    `gradle` directly — bypassing the broken gradlew wrapper entirely.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ── 4. Set up Android SDK ────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Accept Android licenses ───────────────────────────────────────────
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. Install required SDK components ───────────────────────────────────
      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 7. Cache Gradle home ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 8. Build Debug APK using `gradle` command directly ───────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 9. Build Release APK ─────────────────────────────────────────────────
      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 10. Upload Debug APK ──────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NepuTV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Upload Release APK ────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NepuTV-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 12. Auto-release on version tags (e.g. git tag v1.0 && git push --tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
